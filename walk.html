<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0f18" />
    <title>Walk / Run — HR + GPS</title>
    <style>
        :root {
            --theme-color: #c0322f;
            --accent: var(--theme-color);
            --accent-dark: color-mix(in srgb, var(--accent) 65%, black);
            --accent-bright: color-mix(in srgb, var(--accent) 75%, white);
            --bg: #0b0f18;
            --outside-bg: color-mix(in srgb, var(--bg) 55%, #000);
            --card: #141827;
            --panel: #12162a;
            --text: #f8f8f8;
            --muted: #a0a0ad;
            --good: #4ade80;
            --warn: #fbbf24;
            --bad: #ef4444;
            --z1: #4ade80;
            --z2: #38bdf8;
            --z3: #fbbf24;
            --z4: #fb923c;
            --z5: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--outside-bg);
            color: var(--text);
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .app {
            max-width: 540px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 12px calc(env(safe-area-inset-bottom) + 12px) 12px;
            gap: 10px;
        }

        /* ===== HEADER ===== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 4px 4px;
        }
        .topbar a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 6px 8px;
        }
        .topbar h1 {
            margin: 0;
            font-size: 0.95rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text);
            font-weight: 700;
        }

        /* ===== MODE TOGGLE ===== */
        .mode-toggle {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: var(--panel);
            border: 1px solid color-mix(in srgb, var(--accent) 30%, #000);
            border-radius: 14px;
            padding: 4px;
            gap: 4px;
        }
        .mode-toggle button {
            background: transparent;
            color: var(--muted);
            border: 0;
            padding: 10px 0;
            font-weight: 700;
            letter-spacing: 0.18em;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
        }
        .mode-toggle button.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 10px color-mix(in srgb, var(--accent) 40%, transparent);
        }
        .mode-toggle button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== STATUS PILLS ===== */
        .status-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .pill {
            background: var(--panel);
            border: 1px solid #222840;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pill .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
        }
        .pill.ok .dot { background: var(--good); box-shadow: 0 0 8px var(--good); }
        .pill.warn .dot { background: var(--warn); }
        .pill.bad .dot { background: var(--bad); }
        .pill.searching .dot { background: var(--warn); animation: pulse 1.2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ===== HERO HR ===== */
        .hr-hero {
            background: var(--card);
            border: 1px solid color-mix(in srgb, var(--accent) 35%, #000);
            border-radius: 18px;
            padding: 18px 18px 14px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hr-hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--zone-color, var(--accent)) 22%, transparent), transparent 70%);
            pointer-events: none;
            transition: background 0.6s ease;
        }
        .hr-label {
            font-size: 0.72rem;
            letter-spacing: 0.3em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 2px;
            position: relative;
        }
        .hr-value {
            font-size: clamp(4.5rem, 18vw, 6.5rem);
            font-weight: 800;
            line-height: 1;
            color: var(--zone-color, var(--text));
            letter-spacing: -0.03em;
            font-variant-numeric: tabular-nums;
            position: relative;
            text-shadow: 0 0 22px color-mix(in srgb, var(--zone-color, var(--accent)) 35%, transparent);
            transition: color 0.4s ease;
        }
        .hr-zone {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            color: var(--zone-color, var(--muted));
            text-transform: uppercase;
            margin-top: 4px;
            position: relative;
            min-height: 1.2em;
        }

        /* ===== STATS GRID ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .stat {
            background: var(--card);
            border: 1px solid #222840;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .stat .lbl {
            font-size: 0.7rem;
            letter-spacing: 0.22em;
            color: var(--muted);
            text-transform: uppercase;
        }
        .stat .val {
            font-size: 1.65rem;
            font-weight: 700;
            line-height: 1.1;
            margin-top: 2px;
            font-variant-numeric: tabular-nums;
        }
        .stat .val .unit {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
            margin-left: 4px;
        }

        /* ===== MINI CHART ===== */
        .chart-card {
            background: var(--card);
            border: 1px solid #222840;
            border-radius: 14px;
            padding: 10px;
        }
        .chart-card canvas {
            display: block;
            width: 100%;
            height: 120px;
        }

        /* ===== ROUTE MINI MAP ===== */
        .route-mini {
            background: var(--card);
            border: 1px solid #222840;
            border-radius: 14px;
            padding: 10px 12px 8px;
        }
        .route-mini .route-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .route-mini .route-title {
            font-size: 0.7rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .route-mini .route-sub {
            font-size: 0.7rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }
        .route-mini svg {
            display: block;
            width: 100%;
            height: 140px;
        }
        .route-mini .route-line {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px color-mix(in srgb, var(--accent) 60%, transparent));
        }
        .route-mini .route-start { fill: var(--accent); }
        .route-mini .route-end   { fill: none; stroke: var(--text); stroke-width: 1.5; }
        .route-mini .route-now   { fill: var(--accent); stroke: #fff; stroke-width: 1.2; }

        /* ===== ZONE BAR ===== */
        .zone-bar {
            display: flex;
            height: 8px;
            border-radius: 6px;
            overflow: hidden;
            background: #1a1f33;
        }
        .zone-bar .seg {
            flex: 1 1 0;
            opacity: 0.35;
            transition: opacity 0.3s ease;
        }
        .zone-bar .seg.on { opacity: 1; }
        .zone-bar .seg.z1 { background: var(--z1); }
        .zone-bar .seg.z2 { background: var(--z2); }
        .zone-bar .seg.z3 { background: var(--z3); }
        .zone-bar .seg.z4 { background: var(--z4); }
        .zone-bar .seg.z5 { background: var(--z5); }

        /* ===== CONTROLS ===== */
        .controls {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 6px;
        }
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .btn {
            background: var(--panel);
            color: var(--text);
            border: 1px solid color-mix(in srgb, var(--accent) 30%, #000);
            border-radius: 14px;
            padding: 16px 14px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.08s ease, background 0.2s ease;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 4px 18px color-mix(in srgb, var(--accent) 40%, transparent);
        }
        .btn.danger {
            background: #2a1418;
            border-color: var(--bad);
            color: var(--bad);
        }
        .btn.ghost {
            background: transparent;
            color: var(--muted);
            border-color: #2a2f48;
        }
        .btn.full { grid-column: 1 / -1; }

        .toast {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 80px);
            left: 50%;
            transform: translateX(-50%);
            background: #1a1f33;
            color: var(--text);
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--accent);
            font-size: 0.85rem;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 50;
            max-width: 90vw;
            text-align: center;
        }
        .toast.show { opacity: 1; }

        /* Recording indicator */
        .rec-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--bad);
            margin-right: 6px;
            animation: blink 1.4s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        @media (min-width: 600px) {
            .stats { grid-template-columns: repeat(4, 1fr); }
            .hr-value { font-size: 5.5rem; }
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="topbar">
            <a href="hub.html">← Hub</a>
            <h1>Walk / Run</h1>
            <a href="analysis.html">Review →</a>
        </div>

        <div class="mode-toggle" id="modeToggle">
            <button type="button" data-mode="walk" class="active">Walk</button>
            <button type="button" data-mode="run">Run</button>
            <button type="button" data-mode="hybrid">Hybrid</button>
        </div>

        <div class="status-row">
            <div class="pill" id="hrPill"><span class="dot"></span><span id="hrPillText">HR: tap connect</span></div>
            <div class="pill" id="gpsPill"><span class="dot"></span><span id="gpsPillText">GPS: idle</span></div>
        </div>

        <div class="hr-hero">
            <div class="hr-label" id="hrTopLabel">Heart Rate</div>
            <div class="hr-value" id="hrValue">--</div>
            <div class="hr-zone" id="hrZone">&nbsp;</div>
            <div class="zone-bar" style="margin-top:10px">
                <div class="seg z1" data-zone="1"></div>
                <div class="seg z2" data-zone="2"></div>
                <div class="seg z3" data-zone="3"></div>
                <div class="seg z4" data-zone="4"></div>
                <div class="seg z5" data-zone="5"></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="lbl">Elapsed</div>
                <div class="val" id="statElapsed">0:00</div>
            </div>
            <div class="stat">
                <div class="lbl">Distance</div>
                <div class="val" id="statDistance">0.00<span class="unit">km</span></div>
            </div>
            <div class="stat">
                <div class="lbl" id="paceLabel">Pace</div>
                <div class="val" id="statPace">--<span class="unit" id="paceUnit">/km</span></div>
            </div>
            <div class="stat">
                <div class="lbl">Avg HR</div>
                <div class="val" id="statAvg">--<span class="unit">bpm</span></div>
            </div>
        </div>

        <div class="chart-card">
            <canvas id="miniChart"></canvas>
        </div>

        <div class="route-mini" id="routeMiniCard" hidden>
            <div class="route-head">
                <span class="route-title">Route</span>
                <span class="route-sub" id="routeMiniSub">&nbsp;</span>
            </div>
            <svg id="routeMiniSvg" viewBox="0 0 300 140" preserveAspectRatio="xMidYMid meet"></svg>
        </div>

        <div class="controls">
            <div class="btn-row">
                <button class="btn" id="btnConnect" type="button">Connect HR</button>
                <button class="btn" id="btnGps" type="button">Enable GPS</button>
            </div>
            <div class="btn-row">
                <button class="btn primary full" id="btnStart" type="button">Start</button>
            </div>
            <div class="btn-row" id="liveControls" style="display:none">
                <button class="btn" id="btnPause" type="button">Pause</button>
                <button class="btn danger" id="btnStop" type="button">Finish</button>
            </div>
            <div class="btn-row">
                <button class="btn ghost full" id="btnExport" type="button" disabled>Export CSV</button>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </main>

    <script>
        (() => {
            // ============================================
            // ELEMENTS
            // ============================================
            const $ = id => document.getElementById(id);
            const el = {
                modeToggle: $('modeToggle'),
                hrPill: $('hrPill'),
                hrPillText: $('hrPillText'),
                gpsPill: $('gpsPill'),
                gpsPillText: $('gpsPillText'),
                hrValue: $('hrValue'),
                hrZone: $('hrZone'),
                statElapsed: $('statElapsed'),
                statDistance: $('statDistance'),
                statPace: $('statPace'),
                paceLabel: $('paceLabel'),
                paceUnit: $('paceUnit'),
                statAvg: $('statAvg'),
                miniChart: $('miniChart'),
                routeMiniCard: $('routeMiniCard'),
                routeMiniSvg: $('routeMiniSvg'),
                routeMiniSub: $('routeMiniSub'),
                btnConnect: $('btnConnect'),
                btnGps: $('btnGps'),
                btnStart: $('btnStart'),
                btnPause: $('btnPause'),
                btnStop: $('btnStop'),
                btnExport: $('btnExport'),
                liveControls: $('liveControls'),
                toast: $('toast'),
                zoneSegs: document.querySelectorAll('.zone-bar .seg')
            };

            // ============================================
            // STATE
            // ============================================
            const state = {
                mode: 'walk',              // 'walk' | 'run'
                hrConnected: false,
                hrDevice: null,
                hrChar: null,
                currentHr: null,
                gpsEnabled: false,
                gpsWatchId: null,
                lastFix: null,             // {lat, lon, alt, t, accuracy}
                recording: false,
                paused: false,
                startTs: null,             // ms when recording started
                pausedAccumMs: 0,
                pauseStartTs: null,
                samples: [],               // {t, hr, lat, lon, alt, speed_mps}
                hrSum: 0,
                hrCount: 0,
                distanceM: 0,
                paceSamples: [],           // {t, distanceM} for rolling pace
                routePoints: [],           // {lat, lon} accepted GPS fixes for live route map
                wakeLock: null,
                tickHandle: null,
                lastSampleSec: -1,
                hrMax: null
            };

            // ============================================
            // PROFILE / ACCENT
            // ============================================
            function loadProfile() {
                try {
                    const raw = localStorage.getItem('cardioanalysis:profile');
                    return raw ? JSON.parse(raw) : null;
                } catch { return null; }
            }
            function loadAccent() {
                try {
                    const v = localStorage.getItem('cardioanalysis:accent');
                    if (v && /^#[0-9a-f]{6}$/i.test(v)) {
                        document.documentElement.style.setProperty('--theme-color', v);
                        document.documentElement.style.setProperty('--accent', v);
                    }
                } catch {}
            }
            loadAccent();
            const profile = loadProfile();
            state.units = profile?.units === 'imperial' ? 'imperial' : 'metric';
            state.hrMax = (() => {
                const age = parseInt(profile?.age || '', 10);
                if (!isFinite(age) || age <= 0) return 190;
                return Math.max(120, 220 - age);
            })();

            // ============================================
            // TOAST
            // ============================================
            let toastTimer = null;
            function toast(msg, ms = 2400) {
                el.toast.textContent = msg;
                el.toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => el.toast.classList.remove('show'), ms);
            }

            // ============================================
            // ZONE HELPERS
            // ============================================
            function zoneFor(hr) {
                if (!hr || !state.hrMax) return 0;
                const pct = hr / state.hrMax;
                if (pct < 0.6) return 1;
                if (pct < 0.7) return 2;
                if (pct < 0.8) return 3;
                if (pct < 0.9) return 4;
                return 5;
            }
            function zoneColorVar(z) {
                return z >= 1 && z <= 5 ? `var(--z${z})` : 'var(--text)';
            }
            function updateZoneUi(hr) {
                const z = zoneFor(hr);
                el.hrValue.style.setProperty('--zone-color', zoneColorVar(z));
                document.querySelector('.hr-hero')?.style.setProperty('--zone-color', zoneColorVar(z));
                el.hrZone.style.setProperty('--zone-color', zoneColorVar(z));
                el.hrZone.textContent = z ? `Zone ${z}` : '\u00a0';
                el.zoneSegs.forEach(seg => {
                    const segZ = parseInt(seg.dataset.zone, 10);
                    seg.classList.toggle('on', z > 0 && segZ <= z);
                });
            }

            // ============================================
            // MODE TOGGLE
            // ============================================
            el.modeToggle.addEventListener('click', e => {
                const btn = e.target.closest('button[data-mode]');
                if (!btn || btn.disabled) return;
                state.mode = btn.dataset.mode;
                el.modeToggle.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
                updatePaceDisplay();
            });

            // ============================================
            // BLUETOOTH HR
            // ============================================
            async function connectHr() {
                if (!navigator.bluetooth) {
                    toast('Web Bluetooth not available. Use Chrome on Android/desktop.');
                    return;
                }
                try {
                    el.hrPill.classList.remove('ok','bad'); el.hrPill.classList.add('searching');
                    el.hrPillText.textContent = 'HR: scanning';
                    const device = await navigator.bluetooth.requestDevice({
                        filters: [{ services: ['heart_rate'] }]
                    });
                    state.hrDevice = device;
                    device.addEventListener('gattserverdisconnected', onHrDisconnected);
                    const server = await device.gatt.connect();
                    const service = await server.getPrimaryService('heart_rate');
                    const char = await service.getCharacteristic('heart_rate_measurement');
                    state.hrChar = char;
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', onHrNotification);
                    state.hrConnected = true;
                    el.hrPill.classList.remove('searching','bad');
                    el.hrPill.classList.add('ok');
                    el.hrPillText.textContent = `HR: ${device.name || 'connected'}`;
                    el.btnConnect.textContent = 'Disconnect HR';
                    toast('Heart rate connected');
                } catch (err) {
                    console.error(err);
                    el.hrPill.classList.remove('ok','searching');
                    el.hrPill.classList.add('bad');
                    el.hrPillText.textContent = 'HR: failed';
                    toast('HR connect failed: ' + (err.message || err));
                }
            }
            function disconnectHr() {
                try {
                    state.hrChar?.removeEventListener('characteristicvaluechanged', onHrNotification);
                    state.hrDevice?.gatt?.disconnect();
                } catch {}
                onHrDisconnected();
            }
            function onHrDisconnected() {
                state.hrConnected = false;
                state.hrChar = null;
                state.hrDevice = null;
                state.currentHr = null;
                el.hrPill.classList.remove('ok','searching');
                el.hrPill.classList.add('bad');
                el.hrPillText.textContent = 'HR: disconnected';
                el.btnConnect.textContent = 'Connect HR';
                el.hrValue.textContent = '--';
                updateZoneUi(null);
            }
            function onHrNotification(event) {
                const v = event.target.value;
                const flags = v.getUint8(0);
                const is16 = flags & 0x1;
                const hr = is16 ? v.getUint16(1, true) : v.getUint8(1);
                if (hr > 0 && hr < 250) {
                    state.currentHr = hr;
                    el.hrValue.textContent = hr;
                    updateZoneUi(hr);
                }
            }
            el.btnConnect.addEventListener('click', () => {
                if (state.hrConnected) disconnectHr(); else connectHr();
            });

            // ============================================
            // GPS
            // ============================================
            function haversineM(a, b) {
                const R = 6371000;
                const toRad = x => x * Math.PI / 180;
                const dLat = toRad(b.lat - a.lat);
                const dLon = toRad(b.lon - a.lon);
                const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
                const h = Math.sin(dLat/2)**2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2)**2;
                return 2 * R * Math.asin(Math.sqrt(h));
            }

            function enableGps() {
                if (!navigator.geolocation) {
                    toast('Geolocation not available.');
                    return;
                }
                if (state.gpsWatchId != null) {
                    navigator.geolocation.clearWatch(state.gpsWatchId);
                    state.gpsWatchId = null;
                    state.gpsEnabled = false;
                    el.gpsPill.classList.remove('ok','searching');
                    el.gpsPill.classList.add('bad');
                    el.gpsPillText.textContent = 'GPS: off';
                    el.btnGps.textContent = 'Enable GPS';
                    if (el.routeMiniCard) el.routeMiniCard.hidden = true;
                    return;
                }
                el.gpsPill.classList.remove('ok','bad');
                el.gpsPill.classList.add('searching');
                el.gpsPillText.textContent = 'GPS: searching';
                el.btnGps.textContent = 'Disable GPS';
                state.gpsWatchId = navigator.geolocation.watchPosition(onGpsFix, onGpsError, {
                    enableHighAccuracy: true,
                    maximumAge: 1500,
                    timeout: 30000
                });
                state.gpsEnabled = true;
                renderMiniRoute();
            }
            function onGpsFix(pos) {
                const c = pos.coords;
                const now = performance.now();
                const fix = {
                    lat: c.latitude,
                    lon: c.longitude,
                    alt: isFinite(c.altitude) ? c.altitude : null,
                    accuracy: c.accuracy,
                    speed: isFinite(c.speed) && c.speed != null ? c.speed : null,
                    t: now
                };
                el.gpsPill.classList.remove('searching','bad');
                el.gpsPill.classList.add('ok');
                el.gpsPillText.textContent = `GPS: ±${Math.round(c.accuracy)}m`;

                // distance accumulation only when recording and not paused
                if (state.recording && !state.paused && state.lastFix) {
                    const dt = (fix.t - state.lastFix.t) / 1000;
                    const d = haversineM(state.lastFix, fix);
                    const v = dt > 0 ? d / dt : 0;
                    // reject GPS jumps: >50 m/s (180 km/h) or accuracy > 50m
                    if (v < 50 && c.accuracy < 50) {
                        state.distanceM += d;
                        state.paceSamples.push({ t: fix.t, distanceM: state.distanceM });
                        // prune to last 8s for snappier pace
                        const cutoff = fix.t - 8000;
                        while (state.paceSamples.length > 1 && state.paceSamples[0].t < cutoff) {
                            state.paceSamples.shift();
                        }
                        updateDistanceDisplay();
                        updatePaceDisplay();
                    }
                }

                // route point accumulation — runs whenever GPS is on so the
                // mini map fills in while you stand around waiting to Start.
                // Looser accuracy cutoff than distance (120 m) so the map
                // still appears with imperfect cell-tower fixes; we still
                // reject the (0,0) "no fix" placeholder and impossibly large
                // jumps so the picture stays sane.
                if (Number.isFinite(fix.lat) && Number.isFinite(fix.lon) &&
                    !(fix.lat === 0 && fix.lon === 0) && c.accuracy < 120) {
                    const rp = state.routePoints;
                    const last = rp.length ? rp[rp.length - 1] : null;
                    let accept = true;
                    if (last && state.lastFix) {
                        const dt2 = (fix.t - state.lastFix.t) / 1000;
                        const d2 = haversineM(last, fix);
                        if (dt2 > 0 && d2 / dt2 > 80) accept = false; // > 290 km/h = teleport
                        if (d2 < 2) accept = false; // de-dupe near-stationary fixes
                    }
                    if (accept) {
                        rp.push({ lat: fix.lat, lon: fix.lon });
                        if (rp.length > 4000) rp.splice(0, rp.length - 4000);
                        renderMiniRoute();
                    }
                }
                state.lastFix = fix;
            }
            function onGpsError(err) {
                console.warn('GPS error', err);
                el.gpsPill.classList.remove('ok','searching');
                el.gpsPill.classList.add('bad');
                el.gpsPillText.textContent = 'GPS: ' + (err.code === 1 ? 'denied' : 'error');
            }

            function renderMiniRoute() {
                const svg = el.routeMiniSvg, card = el.routeMiniCard;
                if (!svg || !card) return;
                const pts = state.routePoints;

                // Show the card whenever GPS is enabled so the user has
                // visible confirmation the feature exists; fill it with a
                // gentle placeholder until enough movement is captured.
                if (!state.gpsEnabled) { card.hidden = true; return; }
                card.hidden = false;

                if (!pts || pts.length < 2) {
                    svg.innerHTML =
                        '<text x="150" y="74" text-anchor="middle" ' +
                        'fill="currentColor" opacity="0.45" ' +
                        'font-size="11" font-family="system-ui,sans-serif" ' +
                        'letter-spacing="0.18em">WAITING FOR GPS MOVEMENT…</text>';
                    if (el.routeMiniSub) {
                        el.routeMiniSub.textContent = pts && pts.length ? '1 fix' : '0 fixes';
                    }
                    return;
                }

                let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
                for (const p of pts) {
                    if (p.lat < minLat) minLat = p.lat;
                    if (p.lat > maxLat) maxLat = p.lat;
                    if (p.lon < minLon) minLon = p.lon;
                    if (p.lon > maxLon) maxLon = p.lon;
                }
                const centerLat = (minLat + maxLat) / 2;
                const cosLat = Math.cos(centerLat * Math.PI / 180);
                const M = 111320;
                const wM = (maxLon - minLon) * cosLat * M;
                const hM = (maxLat - minLat) * M;
                if (Math.max(wM, hM) < 3) {
                    svg.innerHTML =
                        '<text x="150" y="74" text-anchor="middle" ' +
                        'fill="currentColor" opacity="0.45" ' +
                        'font-size="11" font-family="system-ui,sans-serif" ' +
                        'letter-spacing="0.18em">WAITING FOR GPS MOVEMENT…</text>';
                    if (el.routeMiniSub) {
                        el.routeMiniSub.textContent = pts.length + ' fixes · stationary';
                    }
                    return;
                }

                const PAD = 8, VB_W = 300, VB_H = 140;
                const innerW = VB_W - PAD * 2, innerH = VB_H - PAD * 2;
                const dataW = Math.max(wM, 1), dataH = Math.max(hM, 1);
                const scale = Math.min(innerW / dataW, innerH / dataH);
                const drawW = dataW * scale, drawH = dataH * scale;
                const offX = PAD + (innerW - drawW) / 2;
                const offY = PAD + (innerH - drawH) / 2;

                const project = (p) => {
                    const x = (p.lon - minLon) * cosLat * M * scale + offX;
                    const y = (maxLat - p.lat) * M * scale + offY;
                    return [x, y];
                };

                const d = pts.map((p, i) => {
                    const [x, y] = project(p);
                    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
                }).join(' ');

                const [sx, sy] = project(pts[0]);
                const [ex, ey] = project(pts[pts.length - 1]);

                const spanM = Math.round(Math.max(wM, hM));
                svg.innerHTML =
                    '<path class="route-line" d="' + d + '"/>' +
                    '<circle class="route-start" cx="' + sx.toFixed(1) + '" cy="' + sy.toFixed(1) + '" r="3.2"/>' +
                    '<circle class="route-now" cx="' + ex.toFixed(1) + '" cy="' + ey.toFixed(1) + '" r="3.6"/>';
                if (el.routeMiniSub) {
                    el.routeMiniSub.textContent = '~' + spanM + ' m span · ' + pts.length + ' fixes';
                }
            }
            el.btnGps.addEventListener('click', enableGps);

            // ============================================
            // DISPLAY UPDATERS
            // ============================================
            function fmtDuration(totalSec) {
                const s = Math.max(0, Math.floor(totalSec));
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const ss = s % 60;
                if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
                return `${m}:${String(ss).padStart(2,'0')}`;
            }
            function updateDistanceDisplay() {
                if (state.units === 'imperial') {
                    const mi = state.distanceM / 1609.344;
                    el.statDistance.innerHTML = `${mi.toFixed(2)}<span class="unit">mi</span>`;
                } else {
                    const km = state.distanceM / 1000;
                    el.statDistance.innerHTML = `${km.toFixed(2)}<span class="unit">km</span>`;
                }
            }
            function updatePaceDisplay() {
                const unitLbl = state.units === 'imperial' ? '/mi' : '/km';
                // rolling pace over last ~8s window
                if (state.paceSamples.length < 2) {
                    el.statPace.innerHTML = `--<span class="unit">${unitLbl}</span>`;
                    return;
                }
                const first = state.paceSamples[0];
                const last = state.paceSamples[state.paceSamples.length - 1];
                const dt = (last.t - first.t) / 1000;
                const dd = last.distanceM - first.distanceM;
                if (dt < 3 || dd < 3) {
                    el.statPace.innerHTML = `--<span class="unit">${unitLbl}</span>`;
                    return;
                }
                const speedMps = dd / dt;            // m/s
                let secPerUnit = 1000 / speedMps;    // sec/km
                if (state.units === 'imperial') secPerUnit *= 1.609344; // sec/mi
                const m = Math.floor(secPerUnit / 60);
                const s = Math.round(secPerUnit % 60);
                if (m > 60) {
                    el.statPace.innerHTML = `--<span class="unit">${unitLbl}</span>`;
                    return;
                }
                el.statPace.innerHTML = `${m}:${String(s).padStart(2,'0')}<span class="unit">${unitLbl}</span>`;
            }
            function updateAvgHr() {
                if (state.hrCount > 0) {
                    const avg = Math.round(state.hrSum / state.hrCount);
                    el.statAvg.innerHTML = `${avg}<span class="unit">bpm</span>`;
                } else {
                    el.statAvg.innerHTML = `--<span class="unit">bpm</span>`;
                }
            }

            // ============================================
            // MINI CHART (rolling last 8 min)
            // ============================================
            function drawMiniChart() {
                const cv = el.miniChart;
                const rect = cv.getBoundingClientRect();
                const dpr = Math.max(1, window.devicePixelRatio || 1);
                if (cv.width !== Math.round(rect.width * dpr) || cv.height !== Math.round(rect.height * dpr)) {
                    cv.width = Math.round(rect.width * dpr);
                    cv.height = Math.round(rect.height * dpr);
                }
                const W = cv.width, H = cv.height;
                const ctx = cv.getContext('2d');
                ctx.clearRect(0, 0, W, H);

                // background grid for zones
                if (state.hrMax) {
                    const yFor = bpm => {
                        const min = 50, max = state.hrMax + 10;
                        const f = (bpm - min) / (max - min);
                        return H - f * H;
                    };
                    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                    ctx.lineWidth = 1 * dpr;
                    [0.6, 0.7, 0.8, 0.9].forEach(p => {
                        const y = yFor(state.hrMax * p);
                        ctx.beginPath();
                        ctx.setLineDash([4 * dpr, 4 * dpr]);
                        ctx.moveTo(0, y); ctx.lineTo(W, y);
                        ctx.stroke();
                    });
                    ctx.setLineDash([]);
                }

                if (state.samples.length < 2) return;

                const windowSec = 480; // 8 min
                const lastT = state.samples[state.samples.length - 1].t;
                const startT = Math.max(0, lastT - windowSec);
                const visible = state.samples.filter(s => s.t >= startT);
                if (visible.length < 2) return;

                const yMin = 50, yMax = (state.hrMax || 200) + 10;
                const xFor = t => ((t - startT) / Math.max(1, lastT - startT)) * W;
                const yFor = hr => H - ((hr - yMin) / (yMax - yMin)) * H;

                ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#c0322f';
                ctx.lineWidth = 2 * dpr;
                ctx.lineJoin = 'round';
                ctx.beginPath();
                visible.forEach((s, i) => {
                    const x = xFor(s.t);
                    const y = yFor(s.hr);
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke();
            }

            // ============================================
            // WAKE LOCK
            // ============================================
            async function acquireWakeLock() {
                try {
                    if ('wakeLock' in navigator) {
                        state.wakeLock = await navigator.wakeLock.request('screen');
                        state.wakeLock.addEventListener('release', () => { state.wakeLock = null; });
                    }
                } catch (err) { console.warn('Wake lock failed', err); }
            }
            function releaseWakeLock() {
                try { state.wakeLock?.release(); } catch {}
                state.wakeLock = null;
            }
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && state.recording && !state.wakeLock) {
                    acquireWakeLock();
                }
            });

            // ============================================
            // RECORDING
            // ============================================
            function startRecording() {
                if (state.recording) return;
                if (!state.hrConnected && !state.gpsEnabled) {
                    toast('Connect HR or enable GPS first');
                    return;
                }
                state.recording = true;
                state.paused = false;
                state.startTs = performance.now();
                state.pausedAccumMs = 0;
                state.samples = [];
                state.hrSum = 0;
                state.hrCount = 0;
                state.distanceM = 0;
                state.paceSamples = [];
                state.routePoints = [];
                if (el.routeMiniCard) el.routeMiniCard.hidden = true;
                if (el.routeMiniSvg) el.routeMiniSvg.innerHTML = '';
                if (el.routeMiniSub) el.routeMiniSub.textContent = '\u00a0';
                state.lastSampleSec = -1;
                state.lastFix = null;
                el.btnStart.style.display = 'none';
                el.liveControls.style.display = 'grid';
                el.btnExport.disabled = true;
                el.modeToggle.querySelectorAll('button').forEach(b => b.disabled = true);
                el.hrPillText.dataset.recPrefix = '1';
                acquireWakeLock();
                tick();
                state.tickHandle = setInterval(tick, 1000);
                toast(`${state.mode === 'run' ? 'Run' : state.mode === 'hybrid' ? 'Hybrid' : 'Walk'} started`);
            }
            function pauseRecording() {
                if (!state.recording) return;
                if (state.paused) {
                    // resume
                    if (state.pauseStartTs != null) {
                        state.pausedAccumMs += performance.now() - state.pauseStartTs;
                    }
                    state.pauseStartTs = null;
                    state.paused = false;
                    el.btnPause.textContent = 'Pause';
                    toast('Resumed');
                } else {
                    state.paused = true;
                    state.pauseStartTs = performance.now();
                    el.btnPause.textContent = 'Resume';
                    toast('Paused');
                }
            }
            function stopRecording() {
                if (!state.recording) return;
                clearInterval(state.tickHandle);
                state.tickHandle = null;
                // finalize paused time
                if (state.paused && state.pauseStartTs != null) {
                    state.pausedAccumMs += performance.now() - state.pauseStartTs;
                    state.pauseStartTs = null;
                }
                state.recording = false;
                state.paused = false;
                releaseWakeLock();
                el.btnStart.style.display = '';
                el.btnStart.textContent = 'Start New';
                el.liveControls.style.display = 'none';
                el.btnPause.textContent = 'Pause';
                el.modeToggle.querySelectorAll('button').forEach(b => b.disabled = false);
                el.btnExport.disabled = state.samples.length === 0;
                drawMiniChart();
                if (state.samples.length > 0) {
                    // Stash in localStorage as a safety net (Export button handles download)
                    try {
                        localStorage.setItem('cardioanalysis:last_walk', JSON.stringify({
                            ts: Date.now(),
                            mode: state.mode,
                            distanceM: state.distanceM,
                            elapsedS: Math.round(elapsedSec()),
                            samples: state.samples
                        }));
                    } catch (err) { console.warn('Stash failed', err); }
                    toast(`${state.samples.length}s session ready — tap Export CSV to save`);
                } else {
                    toast('No samples recorded');
                }
            }
            function elapsedSec() {
                if (!state.startTs) return 0;
                const now = performance.now();
                let pausedMs = state.pausedAccumMs;
                if (state.paused && state.pauseStartTs != null) {
                    pausedMs += now - state.pauseStartTs;
                }
                return Math.max(0, (now - state.startTs - pausedMs) / 1000);
            }
            function tick() {
                const t = elapsedSec();
                el.statElapsed.textContent = fmtDuration(t);
                if (!state.recording || state.paused) return;
                const sec = Math.floor(t);
                if (sec > state.lastSampleSec) {
                    state.lastSampleSec = sec;
                    const hr = state.currentHr;
                    if (hr != null) {
                        state.hrSum += hr;
                        state.hrCount++;
                    }
                    state.samples.push({
                        t: sec,
                        hr: hr != null ? hr : '',
                        lat: state.lastFix ? state.lastFix.lat : '',
                        lon: state.lastFix ? state.lastFix.lon : '',
                        alt: state.lastFix && state.lastFix.alt != null ? state.lastFix.alt : '',
                        speed: state.lastFix && state.lastFix.speed != null ? state.lastFix.speed : ''
                    });
                    updateAvgHr();
                    drawMiniChart();
                }
            }
            el.btnStart.addEventListener('click', startRecording);
            el.btnPause.addEventListener('click', pauseRecording);
            el.btnStop.addEventListener('click', () => {
                if (confirm('Finish this session?')) stopRecording();
            });

            // ============================================
            // CSV EXPORT — schema-compatible with analysis.html
            // ============================================
            function exportCsv(opts) {
                if (!state.samples.length) {
                    toast('Nothing to export');
                    return;
                }
                const isAuto = !!(opts && opts.auto);
                const now = new Date();
                const meta = [
                    '#hr_timer_export=1',
                    `#exported_at=${now.toISOString()}`,
                    `#max_hr=${state.hrMax || ''}`,
                    `#name=${profile?.name || ''}`,
                    `#age=${profile?.age || ''}`,
                    `#sex=${profile?.sex || ''}`,
                    `#height_cm=${profile?.height_cm || ''}`,
                    `#weight_kg=${profile?.weight_kg || ''}`,
                    `#session_type=${state.mode}`,
                    `#rounds=0`,
                    `#work_s=${Math.round(elapsedSec())}`,
                    `#rest_s=0`,
                    `#prep_s=0`,
                    `#cooldown_s=0`,
                    `#distance_m=${Math.round(state.distanceM)}`
                ].join('\n') + '\n';
                const header = 'time_s,phase,round,time_left_s,hr_bpm,lat,lon,alt,speed_mps\n';
                const lines = state.samples.map(s =>
                    `${s.t},${state.mode},0,0,${s.hr},${s.lat},${s.lon},${s.alt},${s.speed}`
                );
                const csv = meta + header + lines.join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const yy = String(now.getFullYear()).slice(-2);
                const nameRaw = (profile?.name || 'Athlete').trim();
                const nameSafe = nameRaw ? nameRaw.replace(/[^a-z0-9]+/gi, '_').replace(/^_+|_+$/g, '') : 'Athlete';
                const km = (state.distanceM / 1000).toFixed(1).replace('.', 'p');
                a.download = `${nameSafe}_${mm}_${dd}_${yy}_${state.mode}_${km}km.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                if (!isAuto) toast('CSV downloaded');
            }
            el.btnExport.addEventListener('click', () => exportCsv());

            // ============================================
            // SAFETY: prevent accidental nav while recording
            // ============================================
            window.addEventListener('beforeunload', e => {
                if (state.recording) {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });

            // ============================================
            // INIT
            // ============================================
            updateZoneUi(null);
            updateAvgHr();
            updateDistanceDisplay();
            updatePaceDisplay();
            window.addEventListener('resize', drawMiniChart);
            drawMiniChart();

            // Recover last session from localStorage (in case auto-download failed)
            try {
                const raw = localStorage.getItem('cardioanalysis:last_walk');
                if (raw) {
                    const last = JSON.parse(raw);
                    if (last && Array.isArray(last.samples) && last.samples.length > 0) {
                        state.samples = last.samples;
                        state.distanceM = last.distanceM || 0;
                        state.lastSampleSec = last.samples[last.samples.length - 1].t || -1;
                        // Recompute avg HR from samples
                        let sum = 0, count = 0;
                        last.samples.forEach(s => {
                            const hr = parseFloat(s.hr);
                            if (isFinite(hr)) { sum += hr; count++; }
                        });
                        state.hrSum = sum; state.hrCount = count;
                        state.startTs = performance.now() - (last.elapsedS || 0) * 1000;
                        state.mode = last.mode || 'walk';
                        el.modeToggle.querySelectorAll('button').forEach(b => {
                            b.classList.toggle('active', b.dataset.mode === state.mode);
                        });
                        el.statElapsed.textContent = fmtDuration(last.elapsedS || 0);
                        updateDistanceDisplay();
                        updateAvgHr();
                        drawMiniChart();
                        el.btnExport.disabled = false;
                        el.btnStart.textContent = 'Start New';
                        const dt = new Date(last.ts || Date.now());
                        toast(`Last ${state.mode} restored — Export CSV available`);
                    }
                }
            } catch (err) { console.warn('Restore failed', err); }

            // Web Bluetooth availability hint
            if (!navigator.bluetooth) {
                el.btnConnect.disabled = true;
                el.btnConnect.textContent = 'HR (no Web BT)';
                el.hrPill.classList.add('bad');
                el.hrPillText.textContent = 'HR: needs Chrome';
            }
            if (!navigator.geolocation) {
                el.btnGps.disabled = true;
                el.gpsPill.classList.add('bad');
                el.gpsPillText.textContent = 'GPS: unsupported';
            }
        })();
    </script>
</body>
</html>
