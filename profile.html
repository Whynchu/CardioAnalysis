<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fighter Profile</title>
    <meta name="theme-color" content="#0b0f18" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="assets/app-icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
    <style>
        :root {
            --theme-color: #0868c0;
            --accent: var(--theme-color);
            --accent-dark: color-mix(in srgb, var(--accent) 65%, black);
            --accent-bright: color-mix(in srgb, var(--accent) 75%, white);
            --bg: #0b0f18;
            --outside-bg: color-mix(in srgb, var(--bg) 55%, #000);
            --card: #141827;
            --panel: #12162a;
            --text: #f8f8f8;
            --muted: #a0a0ad;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--outside-bg);
            color: var(--text);
            font-family: 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .profile {
            width: min(92vw, 720px);
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 22px;
            padding: clamp(18px, 3vmin, 32px);
            box-shadow: 0 0 36px color-mix(in srgb, var(--accent) 30%, black);
        }

        .profile-title {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 800;
            font-size: clamp(1.1rem, 3.4vmin, 1.8rem);
            margin-bottom: 18px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }

        .toggle-group {
            display: inline-flex;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 999px;
            padding: 4px;
            gap: 4px;
        }

        .toggle-group button {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 6px 12px;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.75rem;
        }

        .toggle-group button.active {
            background: var(--accent);
            color: #fff;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            background: #111;
            color: var(--text);
            font-size: 1rem;
        }

        .unit-inline {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .unit-inline input {
            flex: 1;
        }

        .unit-hint {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 6px;
        }

        .profile-actions {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.85rem;
        }

        .profile-note {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .profile-max {
            margin-top: 14px;
            background: var(--panel);
            border-radius: 12px;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-max strong {
            font-size: 1.2rem;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <main class="profile">
        <div class="profile-title">Fighter Profile</div>
        <div class="profile-grid">
            <div>
                <label for="pfName">Name</label>
                <input id="pfName" type="text" placeholder="Fighter name" />
            </div>
            <div>
                <label for="pfAge">Age</label>
                <input id="pfAge" type="number" min="5" max="120" placeholder="Years" />
            </div>
            <div>
                <label for="pfSex">Sex</label>
                <select id="pfSex">
                    <option value="">Select</option>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div>
                <label>Units</label>
                <div class="toggle-group" role="group" aria-label="Units">
                    <button type="button" id="unitMetric" class="active">Metric</button>
                    <button type="button" id="unitImperial">Imperial</button>
                </div>
                <div class="unit-hint">Metric uses cm/kg. Imperial uses ft/in + lb.</div>
            </div>
            <div>
                <label for="pfHeightCm">Height</label>
                <div class="unit-inline" id="heightMetricRow">
                    <input id="pfHeightCm" type="number" min="50" max="250" placeholder="cm" />
                </div>
                <div class="unit-inline" id="heightImperialRow" style="display:none;">
                    <input id="pfHeightFt" type="number" min="3" max="8" placeholder="ft" />
                    <input id="pfHeightIn" type="number" min="0" max="11" placeholder="in" />
                </div>
            </div>
            <div>
                <label for="pfWeightKg">Weight</label>
                <div class="unit-inline" id="weightMetricRow">
                    <input id="pfWeightKg" type="number" min="20" max="300" placeholder="kg" />
                </div>
                <div class="unit-inline" id="weightImperialRow" style="display:none;">
                    <input id="pfWeightLb" type="number" min="50" max="660" placeholder="lb" />
                </div>
            </div>
        </div>

        <div class="profile-max">
            <span>Estimated Max HR</span>
            <strong id="pfMaxHr">--</strong>
        </div>

        <div class="profile-actions">
            <button class="btn" id="pfSave" type="button">Save Profile</button>
            <div class="profile-note" id="pfStatus">Profile not saved yet.</div>
        </div>
    </main>

    <script>
        (() => {
            const $ = s => document.querySelector(s);
            const root = document.documentElement;
            const el = {
                name: $('#pfName'),
                age: $('#pfAge'),
                sex: $('#pfSex'),
                heightCm: $('#pfHeightCm'),
                heightFt: $('#pfHeightFt'),
                heightIn: $('#pfHeightIn'),
                weightKg: $('#pfWeightKg'),
                weightLb: $('#pfWeightLb'),
                unitMetric: $('#unitMetric'),
                unitImperial: $('#unitImperial'),
                heightMetricRow: $('#heightMetricRow'),
                heightImperialRow: $('#heightImperialRow'),
                weightMetricRow: $('#weightMetricRow'),
                weightImperialRow: $('#weightImperialRow'),
                max: $('#pfMaxHr'),
                save: $('#pfSave'),
                status: $('#pfStatus')
            };

            function clamp01(x) { return Math.max(0, Math.min(1, x)); }

            function hexToRgb(hex) {
                const h = (hex || '').trim().replace('#', '');
                const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
                if (full.length !== 6) return null;
                const n = parseInt(full, 16);
                return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
            }

            function rgbToHex({ r, g, b }) {
                const to2 = v => Math.round(v).toString(16).padStart(2, '0');
                return `#${to2(r)}${to2(g)}${to2(b)}`;
            }

            function rgbToHsl({ r, g, b }) {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                const d = max - min;
                let h = 0;
                let s = 0;
                const l = (max + min) / 2;

                if (d !== 0) {
                    s = d / (1 - Math.abs(2 * l - 1));
                    switch (max) {
                        case r: h = ((g - b) / d) % 6; break;
                        case g: h = (b - r) / d + 2; break;
                        case b: h = (r - g) / d + 4; break;
                    }
                    h *= 60;
                    if (h < 0) h += 360;
                }

                return { h, s, l };
            }

            function hslToRgb({ h, s, l }) {
                const C = (1 - Math.abs(2 * l - 1)) * s;
                const hp = (h % 360) / 60;
                const X = C * (1 - Math.abs((hp % 2) - 1));
                let r1 = 0, g1 = 0, b1 = 0;

                if (0 <= hp && hp < 1) [r1, g1, b1] = [C, X, 0];
                else if (1 <= hp && hp < 2) [r1, g1, b1] = [X, C, 0];
                else if (2 <= hp && hp < 3) [r1, g1, b1] = [0, C, X];
                else if (3 <= hp && hp < 4) [r1, g1, b1] = [0, X, C];
                else if (4 <= hp && hp < 5) [r1, g1, b1] = [X, 0, C];
                else if (5 <= hp && hp < 6) [r1, g1, b1] = [C, 0, X];

                const m = l - C / 2;
                return {
                    r: (r1 + m) * 255,
                    g: (g1 + m) * 255,
                    b: (b1 + m) * 255,
                };
            }

            function gradeAccent(hex) {
                const rgb = hexToRgb(hex);
                if (!rgb) return null;
                const base = rgbToHsl(rgb);

                const SHADOW_HUE = 235;
                const HIGHLIGHT_HUE = 65;

                const wrapHue = (h) => ((h % 360) + 360) % 360;

                const hueDelta = (a, b) => {
                    let d = wrapHue(b) - wrapHue(a);
                    if (d > 180) d -= 360;
                    if (d <= -180) d += 360;
                    return d;
                };

                const hueLerp = (a, b, t) => wrapHue(a + hueDelta(a, b) * t);
                const hueDist01 = (a, b) => Math.abs(hueDelta(a, b)) / 180;
                const smoothstep01 = (t) => t * t * (3 - 2 * t);

                const hueBump = (h, center, widthDeg) => {
                    const d = Math.abs(hueDelta(h, center));
                    let t = 1 - (d / widthDeg);
                    t = clamp01(t);
                    return smoothstep01(t);
                };

                const bumpRed = hueBump(base.h, 0, 42);
                const bumpYellow = hueBump(base.h, 60, 55);
                const bumpPink = hueBump(base.h, 320, 50);

                const keepHue = 1 - (1 - bumpRed) * (1 - bumpYellow) * (1 - bumpPink);
                const keepHighlight = 1 - (1 - bumpRed) * (1 - bumpPink);
                const shadowPull = 1 - keepHue;

                const dShadow = hueDist01(base.h, SHADOW_HUE);
                const dHighlight = hueDist01(base.h, HIGHLIGHT_HUE);

                const darkBend = clamp01(0.35 + 0.50 * dShadow);
                const brightBend = clamp01(0.10 + 0.25 * dHighlight);

                const dark = {
                    h: hueLerp(base.h, SHADOW_HUE, darkBend * shadowPull),
                    s: clamp01(base.s * 0.92),
                    l: clamp01(base.l * 0.42)
                };

                const bright = {
                    h: hueLerp(base.h, HIGHLIGHT_HUE, brightBend * (1 - keepHighlight)),
                    s: clamp01(base.s * 1.05),
                    l: clamp01(base.l + (1 - base.l) * 0.22)
                };

                const brightPure = {
                    h: base.h,
                    s: clamp01(base.s * 1.03),
                    l: clamp01(base.l + (1 - base.l) * 0.30)
                };

                const surfaceHue = hueLerp(
                    base.h,
                    SHADOW_HUE,
                    clamp01(0.55 + 0.30 * dShadow) * shadowPull
                );

                const bg = { h: surfaceHue, s: clamp01(base.s * 0.24), l: 0.08 };
                const stage = { h: surfaceHue, s: clamp01(base.s * 0.28), l: 0.10 };
                const card = { ...stage, l: 0.13 };
                const panel = { ...stage, l: 0.12 };

                return {
                    accent: hex,
                    accentDark: rgbToHex(hslToRgb(dark)),
                    accentBright: rgbToHex(hslToRgb(bright)),
                    accentBrightPure: rgbToHex(hslToRgb(brightPure)),
                    bg: rgbToHex(hslToRgb(bg)),
                    stageBg: rgbToHex(hslToRgb(stage)),
                    card: rgbToHex(hslToRgb(card)),
                    panel: rgbToHex(hslToRgb(panel)),
                };
            }

            function mixHex(a, b, t) {
                const ra = hexToRgb(a), rb = hexToRgb(b);
                if (!ra || !rb) return a;
                const lerp = (x, y) => x + (y - x) * t;
                return rgbToHex({
                    r: lerp(ra.r, rb.r),
                    g: lerp(ra.g, rb.g),
                    b: lerp(ra.b, rb.b)
                });
            }

            function applyTheme(accentHex) {
                const t = gradeAccent(accentHex);
                if (!t) return;

                root.style.setProperty('--theme-color', t.accent);
                root.style.setProperty('--accent', t.accent);
                root.style.setProperty('--accent-dark', t.accentDark);
                root.style.setProperty('--accent-bright', t.accentBright);

                root.style.setProperty('--bg', t.bg);
                root.style.setProperty('--card', t.card);
                root.style.setProperty('--panel', t.panel);

                const outsideBg = mixHex(t.bg, '#000000', 0.45);
                root.style.setProperty('--outside-bg', outsideBg);
            }

            function computeMaxHr(age) {
                if (!isFinite(age) || age <= 0) return null;
                return Math.max(120, 220 - age);
            }

            function toKg(lb) {
                return lb / 2.2046226218;
            }

            function toLb(kg) {
                return kg * 2.2046226218;
            }

            function toCmFromImperial(ft, inch) {
                return (ft * 12 + inch) * 2.54;
            }

            function toImperialFromCm(cm) {
                const totalIn = cm / 2.54;
                const ft = Math.floor(totalIn / 12);
                const inch = Math.round(totalIn - ft * 12);
                return { ft, inch };
            }

            function loadProfile() {
                try {
                    const raw = localStorage.getItem('cardioanalysis:profile');
                    return raw ? JSON.parse(raw) : null;
                } catch {
                    return null;
                }
            }

            function fillProfile(profile) {
                if (!profile) return;
                el.name.value = profile.name || '';
                el.age.value = profile.age || '';
                el.sex.value = profile.sex || '';
                el.heightCm.value = profile.height_cm || '';
                el.weightKg.value = profile.weight_kg || '';
                if (profile.height_cm) {
                    const imp = toImperialFromCm(profile.height_cm);
                    el.heightFt.value = imp.ft;
                    el.heightIn.value = imp.inch;
                }
                if (profile.weight_kg) {
                    el.weightLb.value = Math.round(toLb(profile.weight_kg));
                }
                if (profile.units === 'imperial') {
                    setUnits('imperial', false);
                }
                updateMaxHr();
                el.status.textContent = 'Profile loaded.';
            }

            function updateMaxHr() {
                const age = parseInt(el.age.value || '', 10);
                const maxHr = computeMaxHr(age);
                el.max.textContent = isFinite(maxHr) ? `${maxHr} bpm` : '--';
            }

            function setUnits(units, sync) {
                const isImperial = units === 'imperial';
                el.unitMetric.classList.toggle('active', !isImperial);
                el.unitImperial.classList.toggle('active', isImperial);
                el.heightMetricRow.style.display = isImperial ? 'none' : 'flex';
                el.heightImperialRow.style.display = isImperial ? 'flex' : 'none';
                el.weightMetricRow.style.display = isImperial ? 'none' : 'flex';
                el.weightImperialRow.style.display = isImperial ? 'flex' : 'none';

                if (sync) {
                    if (isImperial) {
                        const cm = parseFloat(el.heightCm.value || '');
                        if (isFinite(cm)) {
                            const imp = toImperialFromCm(cm);
                            el.heightFt.value = imp.ft;
                            el.heightIn.value = imp.inch;
                        }
                        const kg = parseFloat(el.weightKg.value || '');
                        if (isFinite(kg)) el.weightLb.value = Math.round(toLb(kg));
                    } else {
                        const ft = parseFloat(el.heightFt.value || '');
                        const inch = parseFloat(el.heightIn.value || '');
                        if (isFinite(ft) && isFinite(inch)) {
                            el.heightCm.value = Math.round(toCmFromImperial(ft, inch));
                        }
                        const lb = parseFloat(el.weightLb.value || '');
                        if (isFinite(lb)) el.weightKg.value = Math.round(toKg(lb));
                    }
                }
            }

            function saveProfile() {
                const isImperial = el.unitImperial.classList.contains('active');
                let heightCm = parseFloat(el.heightCm.value || '');
                let weightKg = parseFloat(el.weightKg.value || '');
                if (isImperial) {
                    const ft = parseFloat(el.heightFt.value || '');
                    const inch = parseFloat(el.heightIn.value || '');
                    if (isFinite(ft) && isFinite(inch)) heightCm = toCmFromImperial(ft, inch);
                    const lb = parseFloat(el.weightLb.value || '');
                    if (isFinite(lb)) weightKg = toKg(lb);
                }

                const profile = {
                    name: el.name.value.trim(),
                    age: el.age.value ? parseInt(el.age.value, 10) : '',
                    sex: el.sex.value || '',
                    height_cm: isFinite(heightCm) ? Math.round(heightCm) : '',
                    weight_kg: isFinite(weightKg) ? Math.round(weightKg) : '',
                    units: isImperial ? 'imperial' : 'metric'
                };
                localStorage.setItem('cardioanalysis:profile', JSON.stringify(profile));
                el.status.textContent = 'Profile saved.';
            }

            const storedAccent = localStorage.getItem('cardioanalysis:accent');
            if (storedAccent) {
                applyTheme(storedAccent);
            }

            setUnits('metric', false);

            const profile = loadProfile();
            fillProfile(profile);

            el.age.addEventListener('input', updateMaxHr);
            el.unitMetric.addEventListener('click', () => setUnits('metric', true));
            el.unitImperial.addEventListener('click', () => setUnits('imperial', true));
            el.save.addEventListener('click', saveProfile);
        })();
    </script>
</body>
</html>
